<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta ubicación — {{ ubicacion['nombre'] }}</title>
  <style>
    {% if formato == 'normal' %}
    @page { size: 10cm 10cm; margin: 0; }
    {% else %}
    @page { size: 100mm 25mm; margin: 0; }
    {% endif %}
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f1f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
    }
    .toolbar { margin-bottom: 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .toolbar button, .toolbar a {
      padding: 8px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #1B4F8A;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .toolbar a.activo { background: #123a66; box-shadow: inset 0 0 0 2px #fff; }
    .toolbar a.inactivo { background: #6c8caf; }

    /* ── Formato Zebra (rollo 100x25mm) ── */
    .fmt-zebra .etiqueta {
      width: 100mm;
      height: 25mm;
      flex-direction: row;
      gap: 3mm;
      padding: 2mm 4mm;
    }
    .fmt-zebra .etiqueta img { width: 20mm; height: 20mm; }
    .fmt-zebra .texto { overflow: hidden; white-space: nowrap; text-align: left; }
    .fmt-zebra .nombre { font-size: 22px; }
    .fmt-zebra .hint { font-size: 9px; }

    /* ── Formato hoja normal (etiqueta grande cuadrada) ── */
    .fmt-normal .etiqueta {
      width: 10cm;
      height: 10cm;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
      border-radius: 10px;
    }
    .fmt-normal .etiqueta img { width: 6.5cm; height: 6.5cm; }
    .fmt-normal .texto { text-align: center; }
    .fmt-normal .nombre { font-size: 26px; white-space: normal; }
    .fmt-normal .hint { font-size: 12px; }

    .etiqueta {
      background: #fff;
      border: 1px solid #999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .etiqueta .nombre {
      font-weight: bold;
      color: #000;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .etiqueta .hint { color: #777; margin-top: 2px; }

    @media print {
      body { background: #fff; min-height: 0; }
      .toolbar { display: none; }
      .etiqueta { border: none; }
    }
  </style>
</head>
<body class="fmt-{{ formato }}">
  <div class="toolbar">
    <a href="{{ url_zebra }}" class="{{ 'activo' if formato == 'zebra' else 'inactivo' }}">Formato Zebra (rollo)</a>
    <a href="{{ url_normal }}" class="{{ 'activo' if formato == 'normal' else 'inactivo' }}">Formato hoja normal</a>
    <button onclick="window.print()">Imprimir etiqueta</button>
  </div>
  <div class="etiqueta">
    <img src="{{ qr_data_uri }}" alt="QR {{ ubicacion['nombre'] }}">
    <div class="texto">
      <div class="nombre">{{ ubicacion['nombre'] }}</div>
      <div class="hint">Escanea para ver el contenido</div>
    </div>
  </div>
</body>
</html>
