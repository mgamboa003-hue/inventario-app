<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta ubicación — {{ ubicacion['nombre'] }}</title>
  <style>
    @page { size: 100mm 25mm; margin: 0; }
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f1f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
    }
    .toolbar { margin-bottom: 20px; }
    .toolbar button {
      padding: 8px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #1B4F8A;
      color: #fff;
      cursor: pointer;
    }
    .etiqueta {
      width: 100mm;
      height: 25mm;
      background: #fff;
      border: 1px solid #999;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 3mm;
      padding: 2mm 4mm;
      overflow: hidden;
    }
    .etiqueta img {
      width: 20mm;
      height: 20mm;
      flex-shrink: 0;
    }
    .etiqueta .texto {
      overflow: hidden;
      white-space: nowrap;
    }
    .etiqueta .nombre {
      font-size: 22px;
      font-weight: bold;
      color: #000;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .etiqueta .hint {
      font-size: 9px;
      color: #777;
      margin-top: 2px;
    }
    @media print {
      body { background: #fff; min-height: 0; }
      .toolbar { display: none; }
      .etiqueta { border: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">Imprimir etiqueta</button>
  </div>
  <div class="etiqueta">
    <img src="{{ qr_data_uri }}" alt="QR {{ ubicacion['nombre'] }}">
    <div class="texto">
      <div class="nombre">{{ ubicacion['nombre'] }}</div>
      <div class="hint">Escanea para ver el contenido</div>
    </div>
  </div>
</body>
</html>
