<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{{ title or "Inventario Wintec" }}</title>

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <!-- Estilos propios -->
  <link rel="stylesheet"
        href="{{ url_for('static', filename='styles.css') }}">

  <!-- Select2 (Cloudflare estable) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css">

  <style>
    /* FIX Bootstrap + Select2 */
    .select2-container .select2-search--dropdown .select2-search__field {
        width: 100% !important;
        padding: 6px 10px !important;
        box-sizing: border-box !important;
    }
    .select2-container--default .select2-search--dropdown {
        display: block !important;
    }
  </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <a class="navbar-brand" href="{{ url_for('index') }}">
    Inventario Wintec
  </a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarMenu">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('index') }}">Inicio</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('listar_productos') }}">Productos</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('listar_movimientos') }}">Movimientos</a>
      </li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for categoria, mensaje in messages %}
        <div class="alert alert-{{ categoria }} alert-dismissible fade show" role="alert">
          {{ mensaje }}
          <button type="button" class="close" data-dismiss="alert" aria-label="Cerrar">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<!-- jQuery completo (DEBE ir primero) -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<!-- Select2 (DEBE ir después de jQuery) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
function formatProducto(producto) {
    if (!producto.id) return producto.text;

    var stock = $(producto.element).data('stock');
    var min = $(producto.element).data('min');

    var color = (stock <= min) ? 'red' : '#333';
    var texto = producto.text;

    if (stock <= 0) {
        texto += '  ❌ SIN STOCK';
    }

    return $('<span style="color:' + color + ';">' + texto + '</span>');
}

$(document).ready(function() {
    $('.select2').select2({
        placeholder: "Buscar producto por nombre o código...",
        width: '100%',
        allowClear: true,
        templateResult: formatProducto,
        templateSelection: function(producto) {
            if (!producto.id) {
                return "Buscar producto por nombre o código...";
            }
            return formatProducto(producto);
        }
    });
});
</script>



</body>
</html>
