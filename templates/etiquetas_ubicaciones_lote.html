<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Etiquetas de ubicaciones — Wintec</title>
  <style>
    @page { size: 100mm 25mm; margin: 0; }
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f1f3f5; }
    .toolbar {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toolbar button {
      padding: 8px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #1B4F8A;
      color: #fff;
      cursor: pointer;
    }
    .lista {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4mm;
      padding: 6mm 0;
    }
    .etiqueta {
      width: 100mm;
      height: 25mm;
      border: 1px dashed #999;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 3mm;
      padding: 2mm 4mm;
      background: #fff;
      overflow: hidden;
      break-inside: avoid;
      page-break-after: always;
    }
    .etiqueta:last-child { page-break-after: auto; }
    .etiqueta img { width: 20mm; height: 20mm; flex-shrink: 0; }
    .etiqueta .nombre {
      font-size: 22px;
      font-weight: bold;
      color: #000;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .vacio { padding: 40px; text-align: center; color: #777; }
    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .lista { padding: 0; gap: 0; }
      .etiqueta { border: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>{{ etiquetas|length }} etiqueta{{ 's' if etiquetas|length != 1 }} de ubicación</div>
    <button onclick="window.print()">Imprimir todas</button>
  </div>

  {% if etiquetas %}
  <div class="lista">
    {% for e in etiquetas %}
    <div class="etiqueta">
      <img src="{{ e.qr_data_uri }}" alt="QR {{ e.nombre }}">
      <div class="nombre">{{ e.nombre }}</div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="vacio">No hay ubicaciones registradas todavía.</div>
  {% endif %}
</body>
</html>
