<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Etiquetas de ubicaciones — Wintec</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f1f3f5; }
    .toolbar {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toolbar button {
      padding: 8px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #1B4F8A;
      color: #fff;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8mm;
      padding: 10mm;
    }
    .etiqueta {
      border: 2px dashed #999;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      background: #fff;
      text-align: center;
      break-inside: avoid;
    }
    .etiqueta img { width: 4.5cm; height: 4.5cm; }
    .etiqueta .nombre {
      font-size: 20px;
      font-weight: bold;
      color: #1B4F8A;
    }
    .vacio { padding: 40px; text-align: center; color: #777; }
    @media print {
      body { background: #fff; }
      .toolbar { display: none; }
      .grid { grid-template-columns: repeat(2, 1fr); padding: 0; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div>{{ etiquetas|length }} etiqueta{{ 's' if etiquetas|length != 1 }} de ubicación</div>
    <button onclick="window.print()">Imprimir todas</button>
  </div>

  {% if etiquetas %}
  <div class="grid">
    {% for e in etiquetas %}
    <div class="etiqueta">
      <div class="nombre">{{ e.nombre }}</div>
      <img src="{{ e.qr_data_uri }}" alt="QR {{ e.nombre }}">
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="vacio">No hay ubicaciones registradas todavía.</div>
  {% endif %}
</body>
</html>
