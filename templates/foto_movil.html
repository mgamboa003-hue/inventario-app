<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir foto — Wintec</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 32px 28px; width: 100%; max-width: 380px; text-align: center; }
.logo { width: 48px; height: 48px; background: linear-gradient(135deg,#e8a020,#f0b429); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 20px; color: #0d1117; margin: 0 auto 16px; }
h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.product-name { color: #e8a020; font-size: 15px; font-weight: 600; margin-bottom: 24px; }
.upload-area { border: 2px dashed #30363d; border-radius: 12px; padding: 32px 20px; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
.upload-area:hover, .upload-area.hover { border-color: #e8a020; background: rgba(232,160,32,0.05); }
.upload-icon { font-size: 40px; margin-bottom: 10px; }
.upload-text { font-size: 14px; color: #8b949e; }
input[type=file] { display: none; }
.btn { display: block; width: 100%; padding: 13px; background: linear-gradient(135deg,#e8a020,#f0b429); color: #0d1117; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
.preview { max-width: 100%; border-radius: 10px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">W</div>
  <h1>Subir foto de producto</h1>
  <div class="product-name">{{ producto_nombre }}</div>
  <form method="POST" enctype="multipart/form-data" id="form">
    <div class="upload-area" onclick="document.getElementById('foto').click()" id="uploadArea">
      <div class="upload-icon">📷</div>
      <div class="upload-text">Toca para tomar foto o elegir de la galería</div>
    </div>
    <img id="preview" class="preview" alt="Preview">
    <input type="file" name="foto" id="foto" accept="image/*" capture="environment" onchange="previewFoto(this)">
    <button type="submit" class="btn" id="btnSubir" style="display:none;">📤 Subir foto</button>
  </form>
</div>
<script>
function previewFoto(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('preview');
      img.src = e.target.result;
      img.style.display = 'block';
      document.getElementById('btnSubir').style.display = 'block';
      document.getElementById('uploadArea').querySelector('.upload-text').textContent = input.files[0].name;
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
</body>
</html>
