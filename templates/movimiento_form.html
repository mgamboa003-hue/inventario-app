{% extends "base.html" %}
{% block content %}
<h2>{{ "Nueva entrada" if tipo == "entrada" else "Nueva salida" }}</h2>

<form method="post" class="mt-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="form-group">
    <label>Producto</label>
    <select name="producto_id" class="form-control select2" required>
      <option value="">-- Selecciona un producto --</option>
      {% for p in productos %}
      <option 
          value="{{ p.id }}"
          data-stock="{{ p.stock_actual }}"
          data-min="{{ p.stock_minimo }}"
      >
          {{ p.nombre }} {% if p.codigo %}({{ p.codigo }}){% endif %} — [{{ p.stock_actual }}]
      </option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label>Cantidad</label>
    <input type="number" name="cantidad" class="form-control" min="1" required>
  </div>

  <div class="form-group">
    <label>Usuario (opcional)</label>
    <input type="text" name="usuario" class="form-control" placeholder="Mauricio, Bodega, etc.">
  </div>

  <div class="form-group">
    <label>Motivo (opcional)</label>
    <textarea name="motivo" class="form-control" rows="2"></textarea>
  </div>

  <button type="submit" class="btn btn-primary">Guardar</button>
  <a href="{{ url_for('listar_movimientos') }}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
