<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nueva contraseña — Inventario Wintec</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      {% if logo_exists %}
        <img src="{{ url_for('static', filename='logo_wintec.png') }}" alt="Wintec">
      {% else %}
        <div class="logo-placeholder">WINTEC</div>
      {% endif %}
      <p class="text-muted mt-2 mb-0" style="font-size:.85rem">Elige tu nueva contraseña</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2" role="alert">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('restablecer_password', token=token) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="nueva_password">Nueva contraseña</label>
        <input type="password" class="form-control" id="nueva_password" name="nueva_password"
               minlength="6" placeholder="Mínimo 6 caracteres" required autofocus autocomplete="new-password">
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold" for="confirmar_password">Confirmar contraseña</label>
        <input type="password" class="form-control" id="confirmar_password" name="confirmar_password"
               minlength="6" placeholder="Repite la contraseña" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" style="background:#1B4F8A;border-color:#1B4F8A">
        <i class="bi bi-check-lg me-1"></i> Guardar nueva contraseña
      </button>
    </form>
  </div>
</div>
</body>
</html>
