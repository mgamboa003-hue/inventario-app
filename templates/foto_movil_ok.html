<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foto guardada — Wintec</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 40px 32px; text-align: center; max-width: 340px; }
.icon { font-size: 56px; margin-bottom: 16px; }
h1 { font-size: 20px; font-weight: 700; color: #3fb950; margin-bottom: 8px; }
p { font-size: 14px; color: #8b949e; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>{{ mensaje }}</h1>
  <p>Puedes cerrar esta pantalla.<br>La foto se actualizará en el inventario.</p>
</div>
</body>
</html>
