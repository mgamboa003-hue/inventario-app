<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta — {{ producto['nombre'] }}</title>
  <style>
    {% if formato == 'normal' %}
    @page { size: 7.5cm 5cm; margin: 0; }
    {% else %}
    @page { size: 100mm 25mm; margin: 0; }
    {% endif %}
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f1f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
    }
    .toolbar { margin-bottom: 20px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .toolbar button, .toolbar a {
      padding: 8px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #1B4F8A;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .toolbar a.activo { background: #123a66; box-shadow: inset 0 0 0 2px #fff; }
    .toolbar a.inactivo { background: #6c8caf; }

    .etiqueta {
      background: #fff;
      border: 1px solid #999;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .etiqueta .info { overflow: hidden; min-width: 0; }
    .etiqueta .codigo {
      font-weight: bold;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .etiqueta .nombre {
      margin-top: 2px;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .etiqueta .ubicacion {
      color: #555;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Formato Zebra (rollo 100x25mm) ── */
    .fmt-zebra .etiqueta { width: 100mm; height: 25mm; gap: 3mm; padding: 2mm 4mm; }
    .fmt-zebra .etiqueta img { width: 20mm; height: 20mm; flex-shrink: 0; }
    .fmt-zebra .codigo { font-size: 16px; }
    .fmt-zebra .nombre { font-size: 15px; }
    .fmt-zebra .ubicacion { font-size: 11px; }

    /* ── Formato hoja normal ── */
    .fmt-normal .etiqueta { width: 7.5cm; height: 5cm; gap: 12px; padding: 10px; border-radius: 6px; }
    .fmt-normal .etiqueta img { width: 3.2cm; height: 3.2cm; flex-shrink: 0; }
    .fmt-normal .info { white-space: normal; }
    .fmt-normal .codigo { font-size: 15px; }
    .fmt-normal .nombre { font-size: 13px; white-space: normal; }
    .fmt-normal .ubicacion { font-size: 11px; white-space: normal; }

    @media print {
      body { background: #fff; min-height: 0; }
      .toolbar { display: none; }
      .etiqueta { border: none; }
    }
  </style>
</head>
<body class="fmt-{{ formato }}">
  <div class="toolbar">
    <a href="{{ url_zebra }}" class="{{ 'activo' if formato == 'zebra' else 'inactivo' }}">Formato Zebra (rollo)</a>
    <a href="{{ url_normal }}" class="{{ 'activo' if formato == 'normal' else 'inactivo' }}">Formato hoja normal</a>
    <button onclick="window.print()">Imprimir etiqueta</button>
  </div>
  <div class="etiqueta">
    <img src="{{ qr_data_uri }}" alt="QR {{ codigo }}">
    <div class="info">
      <div class="codigo">{{ codigo }}</div>
      <div class="nombre">{{ producto['nombre'] }}</div>
      {% if producto['ubicacion'] %}<div class="ubicacion">Ubicación: {{ producto['ubicacion'] }}</div>{% endif %}
    </div>
  </div>
</body>
</html>
