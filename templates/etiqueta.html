<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Etiqueta — {{ producto['nombre'] }}</title>
  <style>
    @page { size: 100mm 25mm; margin: 0; }
    * { box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #f1f3f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
    }
    .toolbar { margin-bottom: 20px; }
    .toolbar button {
      padding: 8px 18px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #1B4F8A;
      color: #fff;
      cursor: pointer;
    }
    .etiqueta {
      width: 100mm;
      height: 25mm;
      background: #fff;
      border: 1px solid #999;
      display: flex;
      align-items: center;
      gap: 3mm;
      padding: 2mm 4mm;
      overflow: hidden;
    }
    .etiqueta img {
      width: 20mm;
      height: 20mm;
      flex-shrink: 0;
    }
    .etiqueta .info {
      overflow: hidden;
      white-space: nowrap;
      min-width: 0;
    }
    .etiqueta .codigo {
      font-weight: bold;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .etiqueta .nombre {
      font-size: 15px;
      margin-top: 2px;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .etiqueta .ubicacion {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media print {
      body { background: #fff; min-height: 0; }
      .toolbar { display: none; }
      .etiqueta { border: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button onclick="window.print()">Imprimir etiqueta</button>
  </div>
  <div class="etiqueta">
    <img src="{{ qr_data_uri }}" alt="QR {{ codigo }}">
    <div class="info">
      <div class="codigo">{{ codigo }}</div>
      <div class="nombre">{{ producto['nombre'] }}</div>
      {% if producto['ubicacion'] %}<div class="ubicacion">Ubicación: {{ producto['ubicacion'] }}</div>{% endif %}
    </div>
  </div>
</body>
</html>
